<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Chatbot — Madame Loyal Paris XXL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22222e;--border:#2a2a3a;--border2:#3a3a4a;--text:#e8e8f0;--text-dim:#8888a0;--text-dim2:#5a5a72;--accent:#ff3366;--accent2:#7c3aed;--accent3:#06b6d4;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px}
.header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.header h1{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.header .subtitle{font-size:13px;color:var(--text-dim);font-family:'Space Mono',monospace;margin-top:6px}
.badge{background:var(--accent);color:white;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:32px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.kpi .value{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent3)}
.kpi .value.warn{color:var(--yellow)}.kpi .value.bad{color:var(--red)}.kpi .value.good{color:var(--green)}
.kpi .label{font-size:11px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.section{margin-bottom:32px}
.section-title{font-family:'Space Mono',monospace;font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.chart-container{position:relative;width:100%;height:260px}
.topic-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.topic-label{font-size:12px;color:var(--text);width:140px;flex-shrink:0;text-align:right}
.topic-bar-bg{flex:1;height:22px;background:var(--surface2);border-radius:4px;overflow:hidden}
.topic-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px}
.topic-count{font-family:'Space Mono',monospace;font-size:11px;color:white;font-weight:700}
.phase-row{display:flex;gap:8px;margin-bottom:20px}
.phase-pill{flex:1;text-align:center;padding:16px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
.phase-pill .phase-value{font-family:'Space Mono',monospace;font-size:32px;font-weight:700}
.phase-pill .phase-label{font-size:11px;color:var(--text-dim);margin-top:4px;text-transform:uppercase}
.phase-pill.pre .phase-value{color:var(--accent3)}.phase-pill.during .phase-value{color:var(--accent)}.phase-pill.post .phase-value{color:var(--accent2)}
.flags-table{width:100%;border-collapse:collapse}
.flags-table th{text-align:left;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border)}
.flags-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:top}
.flags-table tr:last-child td{border-bottom:none}
.score-badge{font-family:'Space Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700;display:inline-block}
.score-badge.low{background:rgba(239,68,68,.15);color:var(--red)}
.score-badge.med{background:rgba(234,179,8,.15);color:var(--yellow)}
.score-badge.good{background:rgba(6,182,212,.15);color:var(--accent3)}
.score-badge.high{background:rgba(34,197,94,.15);color:var(--green)}
.insight-list{list-style:none}
.insight-list li{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5;display:flex;gap:10px}
.insight-list li:last-child{border-bottom:none}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.highlight{color:var(--accent);font-weight:600}
.highlight2{color:var(--accent3);font-weight:600}
.highlight3{color:var(--yellow);font-weight:600}
.post-topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.post-topic-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);border-radius:6px;font-size:12px}
.post-topic-item .ptv{font-family:'Space Mono',monospace;font-weight:700;color:var(--accent2)}
.country-list{display:flex;flex-wrap:wrap;gap:8px}
.country-chip{background:var(--surface2);border:1px solid var(--border);padding:6px 12px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px}
.country-chip .cc{font-family:'Space Mono',monospace;font-weight:700;color:var(--accent3)}

/* CONVERSATION EXPLORER */
.explorer{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.explorer-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.explorer-tab{padding:6px 14px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--text-dim);border:1px solid transparent;background:none;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.explorer-tab:hover{color:var(--text);border-color:var(--border2)}
.explorer-tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.explorer-tab .tab-count{font-family:'Space Mono',monospace;font-size:10px;opacity:.7;margin-left:4px}
.explorer-body{padding:16px;max-height:800px;overflow-y:auto}
.explorer-body::-webkit-scrollbar{width:6px}
.explorer-body::-webkit-scrollbar-track{background:var(--surface)}
.explorer-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.convo-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.convo-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;user-select:none;transition:background .2s}
.convo-header:hover{background:var(--surface3)}
.convo-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.convo-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim)}
.convo-msgs{font-size:11px;color:var(--text-dim2)}
.convo-title{font-size:13px;font-weight:500;color:var(--text);flex:1;margin:0 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.convo-toggle{color:var(--text-dim);font-size:18px;transition:transform .2s;flex-shrink:0}
.convo-card.open .convo-toggle{transform:rotate(180deg)}
.convo-thread{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.convo-card.open .convo-thread{display:block}
.msg{margin-top:12px;display:flex;gap:10px}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.msg.user .msg-avatar{background:var(--accent2);color:white}
.msg.bot .msg-avatar{background:var(--accent3);color:white}
.msg-bubble{flex:1;font-size:13px;line-height:1.6;color:var(--text)}
.msg.user .msg-bubble{color:var(--text)}
.msg.bot .msg-bubble{color:var(--text-dim)}
.msg-score{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim2);margin-top:4px}
.explorer-empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:14px}
.convo-first-msg{font-size:12px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>CHATBOT AUDIT</h1>
    <h1>PARIS XXL 2026</h1>
    <div class="subtitle">Madame Loyal | Assistant — 25 fév → 27 mars 2026</div>

        <li><span class="insight-icon">🔴</span><span>Solde cashless affiche <span class="highlight">0€ remboursable</span> malgré un solde réel</span></li>

      <tr><td><span class="score-badge low">0.264</span></td><td>08/03</td><td>Un stand tatouage sera présent ?</td><td>39</td></tr>
      <tr><td><span class="score-badge low">0.271</span></td><td>10/03</td><td>Carte d'identité sur téléphone ?</td><td>7</td></tr>
      <tr><td><span class="score-badge low">0.275</span></td><td>09/03</td><td>J'ai 17 ans mais mon ami m'accompagne</td><td>7</td></tr>

<div class="section">

<script>
Chart.defaults.color='#8888a0';Chart.defaults.borderColor='#2a2a3a';Chart.defaults.font.family="'DM Sans',sans-serif";Chart.defaults.font.size=11;

const dailyData={"2026-03-05":3,"2026-03-06":39,"2026-03-07":26,"2026-03-08":21,"2026-03-09":24,"2026-03-10":25,"2026-03-11":38,"2026-03-12":35,"2026-03-13":89,"2026-03-14":89,"2026-03-15":76,"2026-03-16":23,"2026-03-17":7,"2026-03-18":3,"2026-03-19":4,"2026-03-20":6,"2026-03-21":6,"2026-03-22":3,"2026-03-23":3,"2026-03-24":3,"2026-03-25":3,"2026-03-26":4,"2026-03-27":4};
new Chart(document.getElementById('dailyChart'),{type:'bar',data:{labels:Object.keys(dailyData).map(d=>d.slice(5)),datasets:[{data:Object.values(dailyData),backgroundColor:Object.keys(dailyData).map(d=>{if(d==='2026-03-13'||d==='2026-03-14')return'#ff3366';if(d<'2026-03-13')return'#06b6d4';return'#7c3aed'}),borderRadius:4,barPercentage:.8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{beginAtZero:true,grid:{color:'#1a1a26'}}}}});

new Chart(document.getElementById('scoreChart'),{type:'doughnut',data:{labels:['Faible (<0.4)','Moyen (0.4-0.6)','Bon (0.6-0.8)','Excellent (0.8+)'],datasets:[{data:[63,201,200,70],backgroundColor:['#ef4444','#eab308','#06b6d4','#22c55e'],borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:16,usePointStyle:true,pointStyle:'circle',font:{size:11}}}}}});

const topicList=[{name:'Billetterie',count:143,color:'#ff3366'},{name:'Cashless',count:101,color:'#06b6d4'},{name:'Transport',count:92,color:'#7c3aed'},{name:'Objets trouvés',count:84,color:'#f97316'},{name:'Autre',count:70,color:'#52525b'},{name:'Contact',count:66,color:'#8b5cf6'},{name:'Remboursement',count:59,color:'#ef4444'},{name:'Food & Boissons',count:57,color:'#22c55e'},{name:'Sécurité',count:46,color:'#f59e0b'},{name:'Vestiaire',count:41,color:'#ec4899'},{name:'Horaires',count:38,color:'#14b8a6'},{name:'Lineup',count:28,color:'#6366f1'},{name:'DICE & Shotgun',count:24,color:'#a855f7'},{name:'Photos',count:15,color:'#0ea5e9'},{name:'VIP & Backstage',count:15,color:'#d946ef'},{name:'Transfert billet',count:15,color:'#10b981'},{name:'Bénévolat',count:14,color:'#78716c'},{name:'Âge & Mineurs',count:4,color:'#eab308'},{name:'PMR',count:2,color:'#64748b'}];
const maxC=Math.max(...topicList.map(t=>t.count));const tb=document.getElementById('topicBars');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Build tabs
const tabsEl = document.getElementById('explorerTabs');
const topicOrder = ["Billetterie", "Cashless", "Transport", "Objets trouvés", "Autre", "Contact", "Remboursement", "Food & Boissons", "Sécurité", "Vestiaire", "Horaires", "Lineup", "DICE & Shotgun", "Photos", "VIP & Backstage", "Transfert billet", "Bénévolat", "Âge & Mineurs", "PMR"];

topicOrder.forEach(topic => {
  const total = CONVO_DATA.totals[topic] || 0;
  const btn = document.createElement('button');
  btn.className = 'explorer-tab';
  btn.innerHTML = topic + '<span class="tab-count">(' + total + ')</span>';
  btn.onclick = () => selectTopic(topic, btn);
  tabsEl.appendChild(btn);
});

function selectTopic(topic, btn) {
  document.querySelectorAll('.explorer-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const body = document.getElementById('explorerBody');
  const convos = CONVO_DATA.selected[topic] || [];

  if (!convos.length) {
    body.innerHTML = '<div class="explorer-empty">Aucune conversation pour ce thème</div>';
    return;
  }

  const shown = CONVO_DATA.selected[topic].length;
  const total = CONVO_DATA.totals[topic];
  let html = '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;font-family:Space Mono,monospace">' + shown + ' sur ' + total + ' conversations affichées (triées par score croissant)</div>';

  convos.forEach((c, i) => {
    const scoreClass = getScoreClass(c.score);
    const scoreVal = c.score !== null ? c.score.toFixed(3) : 'N/A';
    const firstUserMsg = c.messages.find(m => m.role === 'user');
    const preview = firstUserMsg ? escapeHtml(firstUserMsg.content.substring(0, 100)) : '';

    html += '<div class="convo-card" id="convo-' + i + '">';
    html += '<div class="convo-header" onclick="toggleConvo(' + i + ')">';
    html += '<div style="flex:1;min-width:0"><div class="convo-meta">';
    html += '<span class="score-badge ' + scoreClass + '">' + scoreVal + '</span>';
    html += '<span class="convo-date">' + c.date + '</span>';
    html += '<span class="convo-msgs">' + c.msg_count + ' msgs</span>';
    html += '</div>';
    html += '<div class="convo-first-msg">' + preview + '</div></div>';
    html += '<span class="convo-toggle">▾</span>';
    html += '</div>';
    html += '<div class="convo-thread">';

    c.messages.forEach(m => {
      if (m.role === 'user') {
        html += '<div class="msg user"><div class="msg-avatar">👤</div><div class="msg-bubble">' + escapeHtml(m.content) + '</div></div>';
      } else if (m.role === 'assistant') {
        html += '<div class="msg bot"><div class="msg-avatar">🤖</div><div class="msg-bubble">' + escapeHtml(m.content);
        if (m.score !== null && m.score !== undefined) {
          html += '<div class="msg-score">Score: ' + m.score.toFixed(3) + '</div>';
        }
        html += '</div></div>';
      }
    });

    html += '</div></div>';
  });

  body.innerHTML = html;
}

function toggleConvo(i) {
  document.getElementById('convo-' + i).classList.toggle('open');
}
<\/script>
</body>
</html>
